name: Refresh GitHub Health Snapshot

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch GitHub health signals
        run: node scripts/fetch-github-health.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/github-health.json || (
            git add src/data/github-health.json &&
            git commit -m "chore(data): refresh GitHub health signals [skip ci]" &&
            git push || echo "Push blocked by branch protection — health data will update on next scheduled run"
          )
