name: Markdown Link Check

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'docs/**'
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check markdown links
        run: npm run check:md-links

      - name: Publish results to job summary
        if: failure()
        run: |
          echo "## Broken links found" >> $GITHUB_STEP_SUMMARY
          echo "Run \`npm run check:md-links\` locally to see details." >> $GITHUB_STEP_SUMMARY
