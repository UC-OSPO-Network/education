name: Accessibility Scan

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package*.json'
      - '.pa11yci'
      - '.github/workflows/accessibility.yml'
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: accessibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run accessibility check
        if: github.event_name == 'pull_request'
        run: npm run check-a11y

      - name: Run accessibility flow check
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npm run check-a11y:flows

      - name: Run full accessibility check
        if: github.event_name != 'pull_request'
        run: npm run check-a11y:all
