name: Weekly Lesson URL Check

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore previous results (for delta comparison)
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: scripts/output/url-check-results.json
          key: url-check-results-${{ github.run_id }}
          restore-keys: |
            url-check-results-

      - name: Run URL audit
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" = "true" ] || [ -f scripts/output/url-check-results.json ]; then
            node scripts/check-lesson-urls.mjs --previous-results=scripts/output/url-check-results.json
          else
            node scripts/check-lesson-urls.mjs
          fi

      - name: Save results to cache
        uses: actions/cache/save@v4
        with:
          path: scripts/output/url-check-results.json
          key: url-check-results-${{ github.run_id }}

      - name: Publish report to job summary
        run: cat scripts/output/url-report.md >> $GITHUB_STEP_SUMMARY

      - name: Open or update issue on failures
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('scripts/output/url-check-results.json', 'utf8'));
            const failures = results.failures;
            const label = 'link-rot';
            const marker = '<!-- url-check-auto-issue -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 10,
            });
            const openIssue = existing.find(i => i.body?.includes(marker));

            if (failures.length === 0) {
              if (openIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  body: `✅ All lesson URLs are now healthy as of [${new Date().toUTCString()}](${runUrl}). Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  state: 'closed',
                });
                console.log(`Closed issue #${openIssue.number} — all links healthy.`);
              } else {
                console.log('All links healthy, no issue to open or close.');
              }
              return;
            }

            const failureLines = failures.map(f =>
              `- **${f.lesson}** — [${f.url}](${f.url}) \`${f.status} ${f.code}\``
            ).join('\n');

            const body = `${marker}
            ## Broken lesson URLs detected

            **Run:** [${new Date().toUTCString()}](${runUrl})
            **Failures:** ${failures.length}

            ${failureLines}

            ---
            *Auto-generated by the weekly URL check. Will close automatically when all links are healthy.*`;

            // Dedent the body
            const dedented = body.split('\n').map(l => l.trimStart()).join('\n');

            if (openIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: dedented,
              });
              console.log(`Updated issue #${openIssue.number} with ${failures.length} failure(s).`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 Broken lesson URLs detected (${failures.length} link${failures.length > 1 ? 's' : ''})`,
                body: dedented,
                labels: [label],
              });
              console.log(`Opened issue #${created.number} with ${failures.length} failure(s).`);
            }

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: url-audit-report
          path: |
            scripts/output/url-report.md
            scripts/output/url-check-results.json
          retention-days: 30
