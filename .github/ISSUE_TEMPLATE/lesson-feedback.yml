name: Catalog Feedback
description: Share feedback, report issues, or suggest improvements for lessons or the catalog inventory
title: "Feedback: "
labels:
  - lesson-feedback
  - education
  - needs-triage

body:
  - type: input
    id: lesson-name
    attributes:
      label: Lesson or topic (optional)
      description: Name the lesson or topic if relevant — leave blank for general feedback about the catalog
      placeholder: e.g. Introduction to Open Source, or leave blank
    validations:
      required: false

  - type: dropdown
    id: feedback-type
    attributes:
      label: Feedback type
      description: What kind of feedback are you providing?
      options:
        - General catalog feedback
        - Missing lesson suggestion
        - Bug / Error in content
        - Suggestion / Improvement
        - Quality / Clarity feedback
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feedback
      description: >
        Please describe your feedback clearly.
        If reporting a bug, mention the lesson, section, or link.
        If suggesting a missing lesson, describe the topic and audience.
      placeholder: Write your feedback here...
    validations:
      required: true
